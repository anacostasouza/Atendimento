
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório de Atendimentos</title>
    <link href="https://fonts.googleapis.com/css?family=Roboto" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet" />
    <link href="styles/main.css" rel="stylesheet" />
</head>
<body>
    <div class="container mt-5">
        <h2 class="text-center">Relatório de Atendimentos</h2>

        <div class="row mb-3">
            <div class="col-md-4">
                <label>Atendente:</label>
                <select class="form-select" id="select-atendente" onchange="filtrarAtendimentos()">
                    <option value="">Todos</option>
                </select>
            </div>
            <div class="col-md-5">
                <label>Data Inicial:</label>
                <input type="date" id="data-inicial" class="form-control" onchange="filtrarAtendimentos()">
            </div>
            <div class="col-md-5">
                <label>Data Final:</label>
                <input type="date" id="data-final" class="form-control" onchange="filtrarAtendimentos()">
            </div>
            <div class="col-md-2 d-flex align-items-end">
                <button class="btn btn-secondary w-100" onclick="limparFiltros()">Limpar</button>
            </div>
        </div>

        <div class="card mb-3">
            <div class="card-body">
                <h5 class="card-title">Estatísticas</h5>
                <p>Média de tempo de atendimento: <span id="media-tempo">0</span> minutos</p>
                <p>Total de atendimentos: <span id="total-atendimentos">0</span></p>
            </div>
        </div>

        <table class="table table-striped" id="tabela-fila">
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Serviço</th>
                    <th>Prioridade</th>
                    <th>Tempo Total</th>
                    <th>Atendente</th>
                    <th>Data</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

        <a href="index.html" class="btn btn-primary w-100 mt-3">Voltar para Início</a>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script src="../js/relatorio.js"></script>
</body>
</html>

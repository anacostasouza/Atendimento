<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atendimento</title>
    <link href="https://fonts.googleapis.com/css?family=Roboto" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/jqueryui/1.12.1/jquery-ui.min.css" rel="stylesheet" />
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f8f9fa;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        #loading {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.7);
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2 class="text-center">Atendimento</h2>
        
        <div class="mb-3">
            <label class="form-label">Nome do Cliente:</label>
            <input type="text" class="form-control" id="nome-cliente" placeholder="Digite o nome do cliente">
        </div>
        
        <div class="mb-3">
            <label class="form-label">Tipo de Serviço:</label>
            <select class="form-select" id="tipo-servico">
                <option value="Impressão">Impressão</option>
                <option value="Criação">Criação</option>
                <option value="Plotagem">Plotagem</option>
            </select>
        </div>
        
        <div class="mb-3">
            <label class="form-label">Prioridade:</label>
            <select class="form-select" id="prioridade">
                <option value="Normal">Normal</option>
                <option value="Alta">Alta</option>
            </select>
        </div>
        
        <button class="btn btn-primary w-100" onclick="cadastrarCliente()">Cadastrar Cliente</button>
        
        <h4 class="text-center mt-4">Clientes aguardando atendimento</h4>
        <table class="table table-striped" id="tabela-fila">
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Serviço</th>
                    <th>Prioridade</th>
                    <th>Tempo de Espera</th>
                    <th>Ação</th>
                </tr>
            </thead>
            <tbody>
                <!-- Lista de clientes será carregada aqui -->
            </tbody>
        </table>
        
        <a href="atendente.html" class="btn btn-secondary w-100 mt-3">Área do Atendente</a>
        <a href="relatorio.html" class="btn btn-info w-100 mt-3">Relatório de Atendimentos</a>
    </div>

    <div id="loading"></div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jqueryui/1.12.1/jquery-ui.min.js"></script>
    <script>
        function cadastrarCliente() {
            let nome = document.getElementById("nome-cliente").value;
            let servico = document.getElementById("tipo-servico").value;
            let prioridade = document.getElementById("prioridade").value;
            let tempoInicio = new Date().toLocaleTimeString();

            let tabela = document.getElementById("tabela-fila").getElementsByTagName("tbody")[0];
            let newRow = tabela.insertRow();
            newRow.innerHTML = `<td>${nome}</td><td>${servico}</td><td>${prioridade}</td><td data-inicio="${tempoInicio}">${tempoInicio}</td><td><button class='btn btn-success' onclick='finalizarAtendimento(this)'>Finalizar</button></td>`;
        }
        
        function finalizarAtendimento(button) {
            let row = button.parentNode.parentNode;
            let nome = row.cells[0].innerText;
            let servico = row.cells[1].innerText;
            let prioridade = row.cells[2].innerText;
            let tempoInicio = row.cells[3].getAttribute("data-inicio");
            let tempoFim = new Date().toLocaleTimeString();
            let tempoTotal = calcularTempo(tempoInicio, tempoFim);
            
            let relatorio = localStorage.getItem("relatorio") ? JSON.parse(localStorage.getItem("relatorio")) : [];
            relatorio.push({ nome, servico, prioridade, tempoInicio, tempoFim, tempoTotal });
            localStorage.setItem("relatorio", JSON.stringify(relatorio));
            
            row.remove();
        }
        
        function calcularTempo(inicio, fim) {
            let [h1, m1, s1] = inicio.split(":").map(Number);
            let [h2, m2, s2] = fim.split(":").map(Number);
            let inicioSegundos = h1 * 3600 + m1 * 60 + s1;
            let fimSegundos = h2 * 3600 + m2 * 60 + s2;
            let diferenca = fimSegundos - inicioSegundos;
            let horas = Math.floor(diferenca / 3600);
            let minutos = Math.floor((diferenca % 3600) / 60);
            let segundos = diferenca % 60;
            return `${horas.toString().padStart(2, '0')}:${minutos.toString().padStart(2, '0')}:${segundos.toString().padStart(2, '0')}`;
        }
    </script>
</body>
</html>
